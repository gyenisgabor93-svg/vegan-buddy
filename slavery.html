}

/* soft light “museum spotlight” */

    content: "";
    position: absolute;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);

    width: 140%;
    height: 80%;

    background: radial-gradient(
        ellipse at center,
        rgba(120, 160, 200, 0.18),

    pointer-events: none;

    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);

/* TITLE */
h2 {
    font-size: 26px;
    font-weight: 500;

    margin: 0 0 6px 0;

    color: #f0f4f8;
    letter-spacing: 0.3px;
}

/* TEXT */
p {
    font-size: 18px;
    line-height: 1.55;

    margin: 0;

    color: rgba(230, 235, 240, 0.85);

    white-space: pre-line;

    max-width: 65ch; /* 🔥 gives “document / book” feel */

/* BUTTON BASE */
button {
    margin-top: 8px;
    padding: 10px 14px;

    font-size: 16px;

    border-radius: 10px;

    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);

    color: #e9eef2;

    cursor: pointer;

    transition: all 0.25s ease;

    backdrop-filter: blur(8px);

/* hover */
button:hover {
    background: rgba(255, 255, 255, 0.12);
    transform: translateY(-2px);
}

/* OPTIONS (important spacing fix) */

    width: 100%;
    text-align: center;

    margin: 6px 0;
    padding: 12px 14px;

    background: rgba(255, 255, 255, 0.04);

span {
    color: #cfd8e3;
    transition: transform 0.2s ease, color 0.2s ease;
}

span:hover {
    transform: scale(1.2);
    color: white;
}

/* OPTIONAL: smoother transitions between steps */
.container {
    transition: opacity 0.6s ease, transform 0.6s ease;

.container {
    opacity: 1;
    transform: translateY(0);

    transition: opacity 0.5s ease, transform 0.5s ease;
}

/* fade-out (leaving exhibit) */
.fade-out {
    opacity: 0;
    transform: translateY(10px);
}

/* fade-in (arriving exhibit) */
.fade-in {
    opacity: 1;
    transform: translateY(0);

function transitionStep(callback) {
  const container = document.getElementById("container");

  container.classList.add("fade-out");

  setTimeout(() => {
    callback(); // change content

    container.classList.remove("fade-out");
    container.classList.add("fade-in");

    setTimeout(() => {
      container.classList.remove("fade-in");
    }, 600);

  }, 400);
}

let currentStep = 0;

steps.forEach(step => {
  if (step.image) {
    const img = new Image();
    img.src = step.image;
    imageCache[step.image] = img;
  }
});

function showStep() {
  const step = steps[currentStep];

  const title = document.getElementById("title");
  const contentEl = document.getElementById("content");
  const img = document.getElementById("image");
  const optionsDiv = document.getElementById("options");
  const btn = document.getElementById("nextBtn");

  optionsDiv.style.display = "block";

  // ---------------- LANGUAGE STEP ----------------
if (step.type === "language") {
  title.innerText = "🌍";
  contentEl.innerText = "Select your language";
  img.style.display = "none";

  optionsDiv.innerHTML = "";

  const languages = [
    { code: "en", label: "English" },
    { code: "es", label: "Español" },
    { code: "hu", label: "Magyar" }
  ];

  languages.forEach(lang => {
    const b = document.createElement("button");
    b.innerText = lang.label;

    b.onclick = () => {
      currentLanguage = lang.code; // keep logic working (en/es/hu)
      currentStep++;
      optionsDiv.innerHTML = "";
      transitionStep(() => {
  showStep();
});
    };

    optionsDiv.appendChild(b);
  });

  btn.style.display = "none";
  return;
}

  // ---------------- REFLECTION STEP ----------------
  if (step.type === "reflection_past") {
  title.innerText = "";
  img.style.display = "none";
  btn.style.display = "none";

  contentEl.innerText = t(step.contentKey);
  optionsDiv.innerHTML = "";

  const options = [
    { key: "1", text: t("past_reflection_option_1") },
    { key: "2", text: t("past_reflection_option_2") },
    { key: "3", text: t("past_reflection_option_3") }
  ];

  options.forEach(opt => {
    const b = document.createElement("button");
    b.innerText = opt.text;

    b.onclick = () => {
      pastReflectionAnswer = opt.key;

      // show feedback immediately
      contentEl.innerText = t(`past_reflection_feedback_${opt.key}`);
      optionsDiv.innerHTML = "";
      btn.style.display = "inline-block";
      btn.innerText = t("continue");

      btn.onclick = () => {
        currentStep++;
        transitionStep(() => {
  showStep();
});
      };
    };

    optionsDiv.appendChild(b);
  });

  return;
  }

  // ---------------- FINAL STEP ----------------
  if (step.type === "final") {
    img.style.display = "none";
    btn.style.display = "none";

    title.innerText = t(step.titleKey);
    contentEl.innerText = t(step.contentKey);

    optionsDiv.innerHTML = "";

    let rating = 0;
    const stars = document.createElement("div");

    for (let i = 1; i <= 5; i++) {
      const s = document.createElement("span");
      s.innerText = "☆";
      s.style.fontSize = "30px";
      s.style.cursor = "pointer";

      s.onclick = () => {
        rating = i;

        [...stars.children].forEach((c, idx) => {
          c.innerText = idx < i ? "★" : "☆";
        });
        title.style.display = "none";
        contentEl.style.display = "none";
        showFinalFlow(rating);
      };

      stars.appendChild(s);
    }

    optionsDiv.appendChild(stars);
    return;
  }

  // ---------------- PRESENT REFLECTION STEP ----------------
if (step.type === "reflection_present") {
  title.innerText = "";
  img.style.display = "none";
  btn.style.display = "inline-block";

  contentEl.innerText = getPresentReminder();

  optionsDiv.innerHTML = "";

  btn.innerText = t("continue");

  btn.onclick = () => {
    currentStep++;
    transitionStep(() => {
  showStep();
});
  };

  return;
}

  // ---------------- NORMAL STEPS ----------------
  title.innerText = step.titleKey ? t(step.titleKey) : "";
  let content = step.contentKey ? t(step.contentKey) : "";

// add justification if exists
if (step.justificationKey) {
  content += "\n\n" + t(step.justificationKey);
}

contentEl.innerText = content;

  title.style.display = step.titleKey ? "block" : "none";

  img.style.display = step.image ? "block" : "none";
  if (step.image) {
  img.src = imageCache[step.image]?.src || step.image;
}

  btn.style.display = "inline-block";
  btn.innerText = currentStep === 1 ? t("start") : t("next");
}

function nextStep() {
  currentStep++;

  if (currentStep < steps.length) {
    transitionStep(() => {
      showStep();
    });
  }
}

function showFinalFlow(rating) {

  optionsDiv.innerHTML = "";

  const msg = document.createElement("p");

  if (rating < 3) {
    msg.innerText = t(step.negativefeedbackKey);
  } else {
    msg.innerHTML = t(step.positivefeedbackKey);
  }
