<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Index page</title>
  <script type="module">
   
  import { supabase } from "./supabaseClient.mjs";

  async function init() {
  let user;
  try {
    const { data } = await supabase.auth.getUser();
    user = data.user;
  } catch (err) {
    console.warn("Supabase runtime not ready, retrying in 100ms...", err);
    setTimeout(init, 100);
    return;
  }

  // 1. Not logged in
  if (!user) {
    window.location.replace("login.html");
    return;
  }

  try {
    const { data: profile, error } = await supabase
      .from('profiles')
      .select('survey_completed, language')
      .eq('id', user.id)
      .single();

    // 2. Profile does not exist
    if (error && error.code === "PGRST116") {
      console.warn("Profile row not found, redirecting to login.");
      window.location.replace("login.html");
      return;
    }

    // 3. Other unexpected error
    if (error) {
      console.error("Profile fetch failed:", error);
      // Do NOT redirect anywhere – stop and let the app fail visibly
      alert("There was a problem loading your profile. Please refresh or contact support.");
      return;
    }

    // 4. Profile exists → Set language 
    if (profile?.language) {
      localStorage.setItem("preferredLanguage", profile.language);
    }

    const lang = localStorage.getItem("preferredLanguage") || "en";

    // 5. Profile exists, normal routing
    if (profile.survey_completed === true) {
      window.location.replace("homepage.html");
    } else {
      window.location.replace("survey.html");
    }

  } catch (err) {
    // Truly unexpected crash
    console.error("Unexpected error fetching profile:", err);
    alert("Unexpected error. Please refresh the page.");
  }
}

init();

</script>
</head>
<body>
<div id="globalLoader" class="global-loader">
  <div class="spinner"></div>
</div>

  <style>
  html, body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: "Poppins", sans-serif;
  background: #f9f9f9;
  color: #333;

  .global-loader {
  position: fixed;
  inset: 0;
  background: #f9f9f9;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;

  opacity: 1;
  transition: opacity 0.4s ease;
}

/* hidden state */
.global-loader.hidden {
  opacity: 0;
  pointer-events: none;
}

/* spinner */
.spinner {
  width: 42px;
  height: 42px;
  border: 4px solid #ddd;
  border-top: 4px solid #4caf50;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
}</style>
</body>
</html>
