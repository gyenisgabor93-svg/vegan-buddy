function collectSurveyData() {
  const name = String(document.getElementById("name").value || "").trim();
  const description = String(document.getElementById("description").value || "").trim();

  // languages: MUST always be array of objects with {id, label}
  const languages = Array.isArray(selectedLanguages)
    ? selectedLanguages.map(l => ({
        id: String(l.id || l),
        label: String(l.label || "")
      }))
    : [];

  // answers: MUST always be plain object (JSONB safe)
  const answers = Object.fromEntries(
  (t.questions || [])
    .map((q, index) => {
      const selected = document.querySelector(`input[name="q${index}"]:checked`);
      return selected ? [q.id, String(selected.value)] : null;
    })
    .filter(Boolean)
);

  // dealbreaker: ALWAYS array of strings (JSONB safe)
  const dealbreaker = selectedDealbreaker
    ? [String(selectedDealbreaker)]
    : [];

  // lang: ALWAYS string
  const lang = String(currentLang || "en");

  return {
    name,
    description,
    languages,
    answers,
    dealbreaker,
    lang
  };
}

async function normalizeFile(file) {
  if (!file) return null;

  if (file instanceof Blob) return file;

  if (file?.arrayBuffer) {
    const buffer = await file.arrayBuffer();
    return new Blob([buffer], { type: "image/jpeg" });
  }

  return new Blob([file], { type: "image/jpeg" });
}

async function processImage(file) {
  // 1. size limit (10MB hard cap before anything else)
  if (file.size > 10 * 1024 * 1024) {
    throw new Error("File too large (max 10MB)");
  }

  return new Promise((resolve, reject) => {
    const img = new Image();
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    img.onload = () => {
      const size = Math.min(img.width, img.height);

      // 2. square crop (center crop)
      const startX = (img.width - size) / 2;
      const startY = (img.height - size) / 2;

      canvas.width = 512;   // final size (good for profiles)
      canvas.height = 512;

      ctx.drawImage(
        img,
        startX,
        startY,
        size,
        size,
        0,
        0,
        512,
        512
      );

      // 3. compression (JPEG, quality 0.75)
      canvas.toBlob(
        (blob) => {
          if (!blob) return reject("Compression failed");
          resolve(blob);
        },
        "image/jpeg",
        0.75
      );
    };

    img.onerror = reject;

    img.src = URL.createObjectURL(file);
  });
}
